<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Marketing Studio — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6EF;
    --ink: #221F1D;
    --muted: #6B645C;
    --accent: #C05A3E;
    --accent-dark: #A8492F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Schibsted Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 7vh 8vw;
    max-width: 1180px;
  }

  /* Eyebrow */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.2rem;
  }
  .eyebrow svg { width: 15px; height: 15px; }

  /* Headline */
  .headline {
    margin-bottom: 1.9rem;
  }
  .line-1 {
    display: block;
    font-size: clamp(2.6rem, 6.4vw, 5rem);
    font-weight: 600;
    line-height: 1.04;
    letter-spacing: -0.02em;
  }
  .line-2 {
    display: block;
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(2.7rem, 6.8vw, 5.3rem);
    line-height: 1.06;
    letter-spacing: -0.01em;
    margin-top: 0.15em;
  }
  .line-2 .have {
    font-style: normal;
    font-weight: 500;
    text-transform: uppercase;
    color: var(--accent);
    letter-spacing: 0.01em;
  }

  /* Subheading */
  .subheading {
    font-size: clamp(1.05rem, 1.7vw, 1.3rem);
    line-height: 1.55;
    color: var(--muted);
    max-width: 33ch;
    margin-bottom: 2.6rem;
  }

  /* CTA */
  .cta {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    gap: 8px;
    background: var(--accent);
    color: var(--cream);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    padding: 0.95rem 1.9rem;
    border-radius: 999px;
    transition: background 0.18s ease, transform 0.18s ease;
  }
  .cta:hover { background: var(--accent-dark); transform: translateY(-2px); }
  .cta svg { width: 16px; height: 16px; }

  @media (max-width: 600px) {
    .hero { padding: 9vh 7vw; }
    .subheading { max-width: 26ch; }
  }
</style>
</head>
<body>
  <section class="hero">
    <p class="eyebrow">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C12 6.5 8.5 10 4 10C8.5 10 12 13.5 12 18C12 13.5 15.5 10 20 10C15.5 10 12 6.5 12 2Z" fill="#C05A3E"/>
      </svg>
      Stellar Marketing Studio
    </p>

    <h1 class="headline">
      <span class="line-1">Make people think</span>
      <span class="line-2">&ldquo;I <span class="have">have</span> to work with her&rdquo;</span>
    </h1>

    <p class="subheading">
      Marketing built around who you are - and the clients you actually want.
    </p>

    <a class="cta" href="#">
      Book a Marketing MOT
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </section>
</body>
</html>
